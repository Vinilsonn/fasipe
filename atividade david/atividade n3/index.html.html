<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Média</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #007BFF;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.5);
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #007BFF;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        #resultado {
            margin-top: 15px;
            font-weight: bold;
        }

        .aprovado {
            color: green;
        }

        .reprovado {
            color: red;
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Simulador de média semestral</h1>

        <form>
            <label>Atividade 1:</label>
            <input type="number" id="atv1" step="0.1">

            <label>Prova 1:</label>
            <input type="number" id="prova1" step="0.1">

            <label>Prova Integrada (N2):</label>
            <input type="number" id="prova2" step="0.1">

            <label>Atividade 3:</label>
            <input type="number" id="atv3" step="0.1">

            <label>Prova 3:</label>
            <input type="number" id="prova3" step="0.1">

            <button type="button" onclick="calcular()">Calcular</button>
        </form>

        <h2 id="resultado"></h2>

        <footer>
            <p>Desenvolvido por Vinicius de Souza Lima</p>
        </footer>
    </div>

    <script src="calculo.js"></script>

</body>
</html>
